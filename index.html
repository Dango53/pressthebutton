<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>絶対に押せないボタン</title>
    <style>
        * { touch-action: manipulation; box-sizing: border-box; }
        body { margin: 0; background-color: #131313; color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; position: relative; }

        .screen { display: none; text-align: center; width: 100%; height: 100%; position: absolute; top: 0; left: 0; justify-content: center; align-items: center; flex-direction: column; padding: 20px; }
        .active { display: flex; }

        h1 { font-size: 5rem; color: #ff3949; text-shadow: 0 0 20px #ff2949; margin-bottom: 50px; }
        p { font-size: 1.7rem; margin-bottom: 20px; color: #ccc; }

        .btn { padding: 20px 40px; font-size: 1.5rem; font-weight: bold; border-radius: 50px; border: none; cursor: pointer; transition: background 0.2s; }
        .start-btn { background: #38bdf8; color: #000; box-shadow: 0 0 15px rgba(56, 189, 248, 0.7); }

        /* ターゲットボタン（逃げるやつ） */
        #target-btn {
            background: #ef4444; color: white; position: absolute; z-index: 100;
            transition: transform 0.1s ease-out, left 0.1s ease-out, top 0.1s ease-out;
            box-shadow: 0 0 25px rgba(239, 68, 68, 0.8);
        }

        /* 偽通知 */
        .popup { position: fixed; top: -100px; left: 5%; width: 90%; background: rgba(255,255,255,0.95); color: #000; padding: 15px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.6); z-index: 1000; font-weight: bold; transition: top 0.3s ease-out; }

        /* 妨害オーバーレイ：壊れた画面 */
        #broken-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiPjxkZWZzPjxwYXR0ZXJuIGlkPSJjcmFjayIgcGF0dGVyblVuaXRzPSJ1c2VyU3BhY2VPblVzZSIgd2lkdGg9IjIwMCIgaGVpZHRoPSIyMDAiPjxwYXRoIGQ9Ik0wLDEwMCBMMjAwLDEwMCBNMTAwLDAgTDEwMCwyMDAgTTUwLDUwIEwxNTAsMTUwIE0xNTAsNTAgTDUwLDE1MCIgc3Ryb2tlPSIjZmZmIiBzdHJva2Utd2lkdGg9IjAuNSIgb3BhY2l0eT0iMC41Ii8+PC9wYXR0ZXJuPjwvZGVmcz48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZHRoPSIxMDAlIiBmaWxsPSJ1cmwoI2NyYWNrKSIvPjwvc3ZnPg=='); display: none; z-index: 900; pointer-events: none; }

        /* 分身ボタン */
        .clone-btn { position: absolute; background: rgba(239, 68, 68, 0.3); color: rgba(255,255,255,0.5); border: none; padding: 15px 30px; border-radius: 50px; z-index: 50; pointer-events: auto; }

        /* 心理的妨害：フェイク再起動画面 */
        #reboot-screen { background: #000; z-index: 2000; color: #fff; font-family: monospace; text-align: left; align-items: flex-start; padding: 50px; }
        .progress-bar { width: 0%; height: 20px; background: #0f0; margin-top: 20px; transition: width 0.5s; }

        /* 画面全体の回転・明滅 */
        body.rotate-all { animation: rotateBody 2s infinite linear; }
        body.flash-all { animation: flashBody 0.2s infinite; }

        @keyframes rotateBody { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes flashBody { 0%, 100% { background: #000; } 50% { background: #330000; } }
    </style>
</head>
<body>

    <div id="popup" class="popup">📱 友達からのメッセージ<br>「何してるの？ｗ」</div>
    <div id="broken-screen"></div>
    <div id="clone-container"></div>

    <div id="menu-screen" class="screen active">
        <h1>絶対に押せない<br>ボタン</h1>
        <p>※心臓の弱い方はご遠慮ください</p>
        <button class="btn start-btn" onclick="startGame()">スタート</button>
    </div>

    <div id="game-screen" class="screen">
        <p id="msg">ボタンを1回タップできればクリア</p>
        <button id="target-btn" class="btn">押して！</button>
    </div>

    <div id="reboot-screen" class="screen">
        <pre>
SYSTEM REBOOTING...
------------------
Initializing Kernel... OK
Loading Modules... OK
Checking Storage... [####      ] 40%
WARNING: Corrupted data detected.
Attempting Repair...
------------------
DO NOT POWER OFF.
        </pre>
        <div class="progress-bar" id="progress"></div>
    </div>

    <script>
        const screens = { menu: 'menu-screen', game: 'game-screen', reboot: 'reboot-screen' };
        const els = {
            body: document.body, game: document.getElementById('game-screen'), btn: document.getElementById('target-btn'),
            msg: document.getElementById('msg'), popup: document.getElementById('popup'), broken: document.getElementById('broken-screen'),
            clones: document.getElementById('clone-container'), progress: document.getElementById('progress')
        };
        const sounds = { error: new Audio('error.mp3'), laugh: new Audio('laugh.mp3') };

        let currentStage = 1;
        let missCount = 0;
        let isFakeRebooting = false;

        function showScreen(screenId) {
            Object.values(screens).forEach(id => document.getElementById(id).classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function startGame() {
            showScreen(screens.game);
            moveButton();
            // 音声再生のトリガー（スマホはユーザー操作が必要）
            sounds.error.load(); sounds.laugh.load();
        }

        function moveButton() {
            if (isFakeRebooting) return;
            // 画面の端に行き過ぎないように調整
            const padding = 60;
            const x = Math.random() * (window.innerWidth - els.btn.clientWidth - padding) + padding/2;
            const y = Math.random() * (window.innerHeight - els.btn.clientHeight - padding) + padding/2;
            els.btn.style.left = `${x}px`; els.btn.style.top = `${y}px`;
        }

        function playSound(sound) { sound.currentTime = 0; sound.play().catch(()=>{}); }
        function vibrate(pat = 50) { if (navigator.vibrate) navigator.vibrate(pat); }

        function showPopup(text, time = 2000) {
            els.popup.innerHTML = text; els.popup.style.top = '20px';
            setTimeout(() => { els.popup.style.top = '-100px'; }, time);
        }

        // スマホ用のタッチイベント
        els.btn.addEventListener('touchstart', (e) => {
            e.preventDefault(); // クリック判定をキャンセルして先に逃げる
            if (isFakeRebooting) return;
            missCount++;
            
            vibrate(80);
            moveButton();
            applyGimmicks();
        });

        // 妨害ロジック
        function applyGimmicks() {
            // ステージ1: メッセージ煽り (1-3回)
            if (missCount === 1) els.msg.innerText = "あれ？遅いね？";
            if (missCount === 3) { els.msg.innerText = "本気？"; showPopup("📱 バッテリー残量 5%"); }

            // ステージ2: 偽通知と振動 (4-7回)
            if (missCount === 4) {
                currentStage = 2; els.msg.innerText = "邪魔が入るぞ〜ｗ";
                playSound(sounds.error);
                vibrate([100, 50, 100]);
            }
            if (missCount === 6) showPopup("⚠️ システム警告：不明なエラー", 3000);

            // ステージ3: 視覚妨害 - 画面回転と明滅 (8-11回)
            if (missCount === 8) {
                currentStage = 3; els.msg.innerText = "目が回るね！";
                els.body.classList.add('rotate-all');
            }
            if (missCount === 10) { els.body.classList.add('flash-all'); showPopup("📱 友達からのメッセージ<br>「まだやってんの？ウケるｗ」"); }

            // ステージ4: 壊れた画面と音、分身ボタン (12-15回)
            if (missCount === 12) {
                currentStage = 4; els.msg.innerText = "どれが本物かな？";
                els.body.classList.remove('rotate-all', 'flash-all');
                els.broken.style.display = 'block';
                playSound(sounds.laugh);
                createClones();
            }
            if (missCount === 14) showPopup("⚠️ ファイルの破損が深刻です", 3000);

            // ステージ5: 心理戦 - 偽再起動 (16回目)
            if (missCount === 16) {
                startFakeReboot();
            }
        }

        // 分身ボタンを作成
        function createClones() {
            els.clones.innerHTML = '';
            for (let i = 0; i < 8; i++) {
                const clone = document.createElement('button');
                clone.innerText = "押して！";
                clone.className = 'btn clone-btn';
                els.clones.appendChild(clone);
                moveClone(clone);
                clone.addEventListener('touchstart', (e) => {
                    e.preventDefault(); playSound(sounds.error); moveClone(clone);
                });
            }
        }

        function moveClone(clone) {
            const padding = 50;
            clone.style.left = `${Math.random() * (window.innerWidth - padding * 2) + padding}px`;
            clone.style.top = `${Math.random() * (window.innerHeight - padding * 2) + padding}px`;
        }

        // フェイク再起動
        function startFakeReboot() {
            isFakeRebooting = true;
            showScreen(screens.reboot);
            els.btn.style.display = 'none';
            els.clones.innerHTML = '';
            els.broken.style.display = 'none';
            
            let prog = 0;
            const timer = setInterval(() => {
                prog += Math.random() * 15;
                if (prog > 100) prog = 100;
                els.progress.style.width = `${prog}%`;
                vibrate(20);
                
                if (prog === 100) {
                    clearInterval(timer);
                    setTimeout(() => {
                        alert("...というのは嘘です。");
                        location.reload(); // 最初から
                    }, 1000);
                }
            }, 500);
        }

        // 万が一触れた時
        els.btn.addEventListener('click', () => {
            if (isFakeRebooting) return;
            alert("おめでとう！君の指は光速を超えた！");
            location.reload();
        });
    </script>
</body>
</html>
