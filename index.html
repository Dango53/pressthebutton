<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>絶対に押せないボタン</title>
    <style>
        * { touch-action: none; user-select: none; box-sizing: border-box; }
        body { margin: 0; background: #131313; color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; }

        /* スクリーン管理 */
        .screen { display: none; width: 100%; height: 100%; position: absolute; justify-content: center; align-items: center; flex-direction: column; text-align: center; }
        .active { display: flex; }

        /* メニュー画面 */
        h1 { font-size: 4rem; color: #ff3939; text-shadow: 0 0 20px rgba(255, 11, 11, 0.519); margin-bottom: 40px; }
        .btn { padding: 20px 40px; font-size: 1.5rem; font-weight: bold; border-radius: 50px; border: none; cursor: pointer; z-index: 1000; }
        .start-btn { background: #10b981; color: white; box-shadow: 0 10px 0 #065f46; transition: 0.1s; }
        .start-btn:active { transform: translateY(5px); box-shadow: 0 5px 0 #065f46; }

        /* ゲーム画面 */
        #target-btn { position: absolute; background: #ef4444; color: white; padding: 15px 30px; border-radius: 8px; border: none; font-weight: bold; transition: 0.05s linear; }
        #game-msg { position: fixed; top: 20px; font-size: 1.2rem; color: #444; pointer-events: none; }

        /* 妨害：Geometry Dash モード */
        .gd-obstacle { position: absolute; background: #ffea00; border: 3px solid #000; z-index: 500; pointer-events: auto; }

        /* 妨害：VS Code モード (偽画面) */
        #vscode-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1e1e1e;
            display: none; z-index: 2000; font-family: 'Consolas', monospace; padding: 20px; text-align: left; overflow: hidden;
        }
        .code-line { color: #d4d4d4; font-size: 12px; margin-bottom: 2px; }
        .error-text { color: #f44747; font-weight: bold; animation: blink 0.5s infinite; }

        /* ホラー演出 */
        #jumpscare {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 5000; display: none; align-items: center; justify-content: center;
        }
        #scary-face { width: 100%; height: 100%; object-fit: cover; filter: grayscale(1) contrast(2); }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        @keyframes shake { 0% { left: 0; } 25% { left: 5px; } 50% { left: -5px; } 75% { left: 5px; } 100% { left: 0; } }
        .shake { animation: shake 0.1s infinite; }
    </style>
</head>
<body>

    <div id="menu-screen" class="screen active">
        <h1>絶対に押せないボタン</h1>
        <button class="btn start-btn" onclick="startGame()">スタート</button>
    </div>

    <div id="game-screen" class="screen">
        <div id="game-msg">ボタンを押せ</div>
        <button id="target-btn">ボタン</button>
    </div>

    <div id="vscode-overlay">
        <div class="code-line"><span style="color:#569cd6">import</span> os, sys</div>
        <div class="code-line"><span style="color:#ce9178">"CRITICAL ERROR: Memory Corruption detected"</span></div>
        <div class="code-line"><span style="color:#6a9955">// Recovering user data... [FAILED]</span></div>
        <div class="code-line" style="margin-top:20px">Deleting <span style="color:#dcdcaa">C:/Users/Admin/Photos...</span></div>
        <div class="code-line">Deleting <span style="color:#dcdcaa">C:/Users/Admin/Documents...</span></div>
        <div class="error-text" style="font-size: 20px; margin-top: 40px;">ERROR: FAILED TO STOP DELETION</div>
    </div>

    <div id="jumpscare">
        <div style="width:200px; height:200px; background:radial-gradient(circle, #f00 0%, #000 70%); border-radius:50%; box-shadow: 0 0 100px #f00;"></div>
    </div>

    <script>
        let clickCount = 0;
        const target = document.getElementById('target-btn');
        const vscode = document.getElementById('vscode-overlay');
        const jumpscare = document.getElementById('jumpscare');

        function moveButton() {
            const x = Math.random() * (window.innerWidth - target.clientWidth - 40) + 20;
            const y = Math.random() * (window.innerHeight - target.clientHeight - 40) + 20;
            target.style.left = `${x}px`;
            target.style.top = `${y}px`;
        }

        function startGame() {
            document.getElementById('menu-screen').classList.remove('active');
            document.getElementById('game-screen').classList.add('active');
            moveButton();
        }

        // 逃げる処理
        target.addEventListener('touchstart', (e) => {
            e.preventDefault();
            // 90%の確率で逃げる、10%でタップ成功
            if (Math.random() > 0.1) {
                moveButton();
                vibrate(30);
                checkGimmicks();
            } else {
                onSuccess();
            }
        });

        function onSuccess() {
            clickCount++;
            moveButton();
            vibrate([50, 30, 50]);
            checkGimmicks();
            if (clickCount >= 80) win();
        }

        function vibrate(p) { if (navigator.vibrate) navigator.vibrate(p); }

        function checkGimmicks() {
            // 20回〜: Geometry Dash風の流れるトゲ
            if (clickCount >= 10 && clickCount < 30) {
                if (Math.random() > 0.7) spawnGDObstacle();
            }

            // 40回〜: 突然のVS Code画面（5秒間）
            if (clickCount === 40) {
                vscode.style.display = 'block';
                vibrate([500, 100, 500]);
                setTimeout(() => { vscode.style.display = 'none'; }, 4000);
            }

            // 60回〜: ホラー演出（急な画像と画面の揺れ）
            if (clickCount >= 60) {
                document.body.classList.add('shake');
                if (Math.random() > 0.92) {
                    jumpscare.style.display = 'flex';
                    setTimeout(() => { jumpscare.style.display = 'none'; }, 150);
                }
            }
        }

        function spawnGDObstacle() {
            const obs = document.createElement('div');
            obs.className = 'gd-obstacle';
            obs.style.width = '40px';
            obs.style.height = '40px';
            obs.style.left = window.innerWidth + 'px';
            obs.style.top = Math.random() * window.innerHeight + 'px';
            document.getElementById('game-screen').appendChild(obs);

            // 右から左へ高速移動（GDのスクロール風）
            let pos = window.innerWidth;
            const anim = setInterval(() => {
                pos -= 10;
                obs.style.left = pos + 'px';
                if (pos < -50) {
                    clearInterval(anim);
                    obs.remove();
                }
            }, 16);

            // 障害物に触れるとペナルティ
            obs.addEventListener('touchstart', () => {
                clickCount = Math.max(0, clickCount - 10);
                vibrate(500);
                obs.style.background = 'red';
            });
        }

        function win() {
            alert("おめでとう、君はボタンを押せた！");
            location.reload();
        }
    </script>
</body>
</html>
